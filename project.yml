name: freitag
options:
  bundleIdPrefix: com.freitag
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: "2.7.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  freitag:
    type: application
    platform: iOS
    sources:
      - path: freitag
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.freitag.app
        CODE_SIGN_ENTITLEMENTS: freitag/freitag.entitlements
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: 2
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: freitag
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    dependencies:
      - package: SwiftSoup
      - target: FreitagShareExtension
    entitlements:
      path: freitag/freitag.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.freitag.app

  FreitagShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: FreitagShareExtension
      - path: freitag/App/SharedModelContainer.swift
      - path: freitag/App/AppConstants.swift
      - path: freitag/Models
    settings:
      base:
        INFOPLIST_FILE: FreitagShareExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.freitag.app.share-extension
        CODE_SIGN_ENTITLEMENTS: FreitagShareExtension/FreitagShareExtension.entitlements
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: 2
    dependencies:
      - package: SwiftSoup
    entitlements:
      path: FreitagShareExtension/FreitagShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.freitag.app
    info:
      path: FreitagShareExtension/Info.plist
      properties:
        CFBundleDisplayName: freitag
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
